<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Start Page</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --text-sub: #5f6368;
            --border-color: #e0e0e0;
            --accent-color: #1a73e8;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* ヘッダーエリア */
        .hero-header {
            position: relative;
            width: 100%;
            height: 160px;
            border-radius: var(--border-radius);
            overflow: hidden;
            background-color: #f1f3f4;
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
            box-shadow: inset 0 -80px 40px rgba(255, 255, 255, 0.85);
        }

        .clock-container {
            position: relative;
            z-index: 2;
            text-align: left;
        }
        #clock {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        #date {
            font-size: 0.95rem;
            color: var(--text-sub);
            margin-top: 4px;
            font-weight: 500;
        }

        /* 🔍 検索バー（音声入力ボタン付き） */
        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 6px 18px;
            background: #fff;
            transition: box-shadow 0.2s;
        }
        .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
        }
        .search-box input {
            flex: 1;
            height: 38px;
            border: none;
            outline: none;
            font-size: 1rem;
        }
        
        /* 🎤 音声入力用マイクボタン */
        .mic-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            transition: color 0.2s;
        }
        .mic-btn:hover {
            color: #ea4335; /* Googleマイク風の赤色 */
        }
        .mic-btn.listening {
            color: #ea4335;
            animation: pulse 1.2s infinite;
        }

        .search-box button[type="submit"] {
            background: none;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0 8px;
            font-weight: 500;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* 通常のリンク集 */
        .grid-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 8px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            text-decoration: none;
            color: var(--text-color);
            transition: background-color 0.2s, transform 0.1s;
            height: 100px;
            background: #fff;
        }
        .link-item:hover {
            background-color: #f8fafc;
            transform: translateY(-1px);
        }
        .link-favicon {
            width: 28px;
            height: 28px;
            margin-bottom: 8px;
            object-fit: contain;
        }
        .link-name {
            font-size: 0.8rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* ノート集のグリッド */
        .grid-notes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .featured-note-card {
            display: block;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            text-decoration: none;
            background: #fff;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .featured-note-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }
        
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 54.55%;
            background-color: #f8fafc;
        }
        .note-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ヘッダー（時計・日付） -->
        <div class="hero-header">
            <div class="clock-container">
                <div id="clock">00:00</div>
                <div id="date">2026年01月01日 (木)</div>
            </div>
        </div>

        <!-- 検索フォーム -->
        <form id="search-form" action="https://www.google.com/search" method="get" target="_blank">
            <div class="search-box">
                <input type="text" id="search-input" name="q" placeholder="Google で検索..." autofocus autocomplete="off">
                
                <!-- 🎤 マイク入力ボタン (SVGアイコン) -->
                <button type="button" id="mic-btn" class="mic-btn" title="音声で検索">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>

                <button type="submit">検索</button>
            </div>
        </form>

        <!-- 🔗 ブックマークリンク集エリア -->
        <div>
            <div class="section-title">Bookmarks</div>
            <div id="links-container" class="grid-links"></div>
        </div>

        <!-- 🖼️ NotebookLM ノート集エリア -->
        <div>
            <div class="section-title">Notebooks</div>
            <div id="notes-container" class="grid-notes"></div>
        </div>

    </div>

    <script>
        // ==========================================
        // ★ ノートを追加したい場合はここを編集します ★
        // ==========================================
        const myNotes = [
            { 
                url: "https://notebooklm.google.com/notebook/1a0c34bd-3b02-400d-8524-723767de1b34", 
                driveId: "1w4L7f7MivD9cSgdFFTF0RR7xuJjJcwwP" 
            },
            { 
                url: "https://notebooklm.google.com", 
                driveId: "ここに2つ目の画像IDを入力" 
            }
        ];

        // ==========================================
        // ★ 通常のリンク集を変えたい場合はここを編集します ★
        // ==========================================
        const mySites = [
            { name: "Googleドライブ", url: "https://drive.google.com" },
            { name: "YouTube",        url: "https://www.youtube.com" },
            { name: "Gemini",         url: "https://gemini.google.com" },
            { name: "NotebookLM",     url: "https://notebooklm.google.com" }
        ];


        // ─── 以下はプログラムが自動で処理する部分です ───

        // 🔗 リンクボタンの自動生成
        const linksContainer = document.getElementById('links-container');
        mySites.forEach(site => {
            const a = document.createElement('a');
            a.href = site.url;
            a.className = 'link-item';
            a.target = '_blank';

            const img = document.createElement('img');
            img.src = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(site.url).hostname}`;
            img.className = 'link-favicon';
            img.alt = site.name;

            const span = document.createElement('span');
            span.className = 'link-name';
            span.textContent = site.name;

            a.appendChild(img);
            a.appendChild(span);
            linksContainer.appendChild(a);
        });

        // 🖼️ ノートカードの自動生成
        const notesContainer = document.getElementById('notes-container');
        myNotes.forEach(note => {
            const a = document.createElement('a');
            a.href = note.url;
            a.className = 'featured-note-card';
            a.target = '_blank';

            const imgContainer = document.createElement('div');
            imgContainer.className = 'image-container';

            const img = document.createElement('img');
            img.src = `https://lh3.googleusercontent.com/u/0/d/${note.driveId}`;
            img.className = 'note-thumbnail';
            img.alt = "Notebook Cover";

            imgContainer.appendChild(img);
            a.appendChild(imgContainer);
            notesContainer.appendChild(a);
        });

        // 🎤 音声認識（Web Speech API）の組み込み
        const micBtn = document.getElementById('mic-btn');
        const searchInput = document.getElementById('search-input');
        const searchForm = document.getElementById('search-form');

        // ブラウザが音声認識に対応しているかチェック
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP'; // 言語を日本語に設定
            recognition.interimResults = false; // 途中経過は不要

            // マイクボタンを押した時の処理
            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });

            // 録音開始時
            recognition.onstart = () => {
                micBtn.classList.add('listening');
                searchInput.placeholder = "音声入力を受付中...";
            };

            // 録音終了時（エラーや完了含む）
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                searchInput.placeholder = "Google で検索...";
            };

            // 音声の聞き取りが成功した時
            recognition.onresult = (event) => {
                const voiceResult = event.results[0][0].transcript;
                searchInput.value = voiceResult;
                // 少しだけ待ってから自動で検索を実行（送信）
                setTimeout(() => {
                    searchForm.submit();
                }, 500);
            };

            // エラーハンドリング
            recognition.onerror = (event) => {
                console.error("音声認識エラー:", event.error);
                micBtn.classList.remove('listening');
            };
        } else {
            // お使いのブラウザ（または環境）が未対応の場合はボタンを隠す
            micBtn.style.display = 'none';
            console.log("お使いのブラウザは音声認識に対応していません。");
        }

        // 🕐 時計の更新
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            document.getElementById('date').textContent = `${year}年${month}月${date}日 (${dayNames[now.getDay()]})`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
